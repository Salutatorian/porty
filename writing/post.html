    <script>
      (function(){
        var params = new URLSearchParams(window.location.search || "");
        var slug = params.get("slug");
        if (!slug) {
          document.getElementById("post-meta").textContent = "";
          document.getElementById("post-title").textContent = "Post not found";
          document.getElementById("post-body").innerHTML = "<p>No post specified. <a href=\"/writing\">Back to writing</a>.</p>";
          return;
        }
        var base = document.querySelector("base");
        var root = (base && base.href) ? new URL(base.href).origin : "";
        fetch((root || "") + "/api/writings?slug=" + encodeURIComponent(slug))
          .then(function(r){
            if (!r.ok) throw new Error("Not found");
            return r.json();
          })
          .then(function(p){
            document.title = (p.title || "Post") + " · Writing · The Greater Engine";
            var timeMeta = p.time || "";
            if (typeof normalizeClockTimeToHHMM === "function" && timeMeta) {
              timeMeta = normalizeClockTimeToHHMM(timeMeta) || timeMeta;
            }
            var meta = (p.date || "") + " · " + timeMeta + " · " + (p.category || "");
            document.getElementById("post-meta").textContent = meta;
            document.getElementById("post-title").textContent = p.title || "—";
            var wrap = document.getElementById("post-audio-wrap");
            var aud = document.getElementById("post-audio");
            var trimHint = document.getElementById("post-audio-trim-hint");
            if (wrap && aud && p.audioUrl) {
              aud.src = p.audioUrl;
              wrap.removeAttribute("hidden");
              var volSlider = document.getElementById("post-audio-volume");
              var playBtn = document.getElementById("post-audio-play");
              var progressEl = document.getElementById("post-audio-progress");
              var progressFill = document.getElementById("post-audio-progress-fill");
              var timeEl = document.getElementById("post-audio-time");
              var startSec = typeof p.audioStartSec === "number" && isFinite(p.audioStartSec) && p.audioStartSec >= 0 ? p.audioStartSec : 0;
              var endSec = typeof p.audioEndSec === "number" && isFinite(p.audioEndSec) && p.audioEndSec > 0 ? p.audioEndSec : null;

              function fmtT(x) {
                return typeof formatDurationSecCompact === "function" ? formatDurationSecCompact(x) : "0000";
              }

              function clipEndResolved() {
                if (!isFinite(aud.duration) || aud.duration <= 0) return null;
                if (endSec != null) return Math.min(endSec, aud.duration);
                return aud.duration;
              }

              function clipStartResolved() {
                return Math.max(0, startSec);
              }

              function applyVolumeFromUi() {
                var v = 0.8;
                if (volSlider) {
                  var parsed = parseFloat(volSlider.value);
                  if (isFinite(parsed)) v = Math.max(0, Math.min(1, parsed));
                }
                aud.volume = v;
              }
              var savedVol = null;
              try {
                savedVol = localStorage.getItem("post_audio_volume");
              } catch (e) {}
              if (volSlider && savedVol != null && !isNaN(parseFloat(savedVol))) {
                volSlider.value = String(Math.max(0, Math.min(1, parseFloat(savedVol))));
              }
              applyVolumeFromUi();
              if (volSlider) {
                volSlider.addEventListener("input", function () {
                  applyVolumeFromUi();
                  try {
                    localStorage.setItem("post_audio_volume", volSlider.value);
                  } catch (e) {}
                });
              }

              function updatePlayerUi() {
                var cs = clipStartResolved();
                var ce = clipEndResolved();
                if (timeEl) {
                  timeEl.textContent = fmtT(aud.currentTime) + " / " + (ce != null ? fmtT(ce) : "—");
                }
                if (!progressFill || ce == null) {
                  if (progressFill) progressFill.style.width = "0%";
                  return;
                }
                var range = ce - cs;
                if (range <= 0) {
                  progressFill.style.width = "0%";
                  return;
                }
                var p = (aud.currentTime - cs) / range;
                p = Math.max(0, Math.min(1, p));
                progressFill.style.width = p * 100 + "%";
                if (progressEl) progressEl.setAttribute("aria-valuenow", String(Math.round(p * 100)));
              }

              function syncPlayButton() {
                if (!playBtn) return;
                var on = !aud.paused;
                playBtn.classList.toggle("is-playing", on);
                playBtn.setAttribute("aria-label", on ? "Pause" : "Play");
              }

              function seekAtClientX(clientX) {
                var ce = clipEndResolved();
                var cs = clipStartResolved();
                if (ce == null || !progressEl) return;
                var range = ce - cs;
                if (range <= 0) return;
                var rect = progressEl.getBoundingClientRect();
                var frac = (clientX - rect.left) / rect.width;
                frac = Math.max(0, Math.min(1, frac));
                var t = cs + frac * range;
                try {
                  aud.currentTime = t;
                } catch (e) {}
              }

              if (playBtn) {
                playBtn.addEventListener("click", function () {
                  if (aud.paused) {
                    aud.play().catch(function () {});
                  } else {
                    aud.pause();
                  }
                });
              }
              aud.addEventListener("play", syncPlayButton);
              aud.addEventListener("pause", syncPlayButton);
              syncPlayButton();

              if (progressEl) {
                progressEl.addEventListener("click", function (e) {
                  seekAtClientX(e.clientX);
                });
                progressEl.addEventListener("keydown", function (e) {
                  var ce = clipEndResolved();
                  var cs = clipStartResolved();
                  if (ce == null) return;
                  var range = ce - cs;
                  if (range <= 0) return;
                  var step = range / 20;
                  if (e.key === "ArrowLeft" || e.key === "ArrowDown") {
                    e.preventDefault();
                    try {
                      aud.currentTime = Math.max(cs, aud.currentTime - step);
                    } catch (err) {}
                  } else if (e.key === "ArrowRight" || e.key === "ArrowUp") {
                    e.preventDefault();
                    try {
                      aud.currentTime = Math.min(ce, aud.currentTime + step);
                    } catch (err) {}
                  }
                });
              }

              if (trimHint) {
                if (startSec > 0 || endSec != null) {
                  var h = startSec > 0 && endSec != null ? "Clip " + fmtT(startSec) + "–" + fmtT(endSec)
                    : startSec > 0 ? "Starts at " + fmtT(startSec)
                    : endSec != null ? "Plays until " + fmtT(endSec)
                    : "";
                  trimHint.textContent = h;
                  trimHint.removeAttribute("hidden");
                } else {
                  trimHint.textContent = "";
                  trimHint.setAttribute("hidden", "");
                }
              }

              function applyTrimBounds() {
                if (endSec != null && isFinite(aud.duration) && endSec > aud.duration) {
                  endSec = aud.duration;
                }
                if (startSec > 0) {
                  try { aud.currentTime = startSec; } catch (e) {}
                }
                updatePlayerUi();
              }

              aud.addEventListener("loadedmetadata", applyTrimBounds);
              aud.addEventListener("seeked", function () {
                if (aud.currentTime < startSec - 0.02) {
                  try { aud.currentTime = startSec; } catch (e) {}
                }
                if (endSec != null && isFinite(aud.duration) && aud.currentTime > Math.min(endSec, aud.duration) + 0.02) {
                  try { aud.currentTime = Math.min(endSec, aud.duration); } catch (e) {}
                }
                updatePlayerUi();
              });

              aud.addEventListener("play", function () {
                if (endSec != null && aud.currentTime >= endSec - 0.12) {
                  try { aud.currentTime = startSec; } catch (e) {}
                } else if (aud.currentTime < startSec - 0.08 || (endSec != null && aud.currentTime > (isFinite(aud.duration) ? Math.min(endSec, aud.duration) : endSec) + 0.02)) {
                  try { aud.currentTime = startSec; } catch (e) {}
                }
              });
              aud.addEventListener("timeupdate", function () {
                if (endSec != null) {
                  var cap = isFinite(aud.duration) ? Math.min(endSec, aud.duration) : endSec;
                  if (aud.currentTime >= cap - 0.08) {
                    aud.pause();
                    try { aud.currentTime = cap; } catch (e) {}
                  }
                }
                updatePlayerUi();
              });
            } else if (wrap) {
              wrap.setAttribute("hidden", "");
              if (trimHint) { trimHint.textContent = ""; trimHint.setAttribute("hidden", ""); }
              if (aud) { aud.removeAttribute("src"); aud.load(); }
            }
            var body = p.body || p.excerpt || "";
            var bodyEl = document.getElementById("post-body");
            if (body && body.indexOf("<") !== -1) {
              bodyEl.innerHTML = body;
            } else {
              bodyEl.innerHTML = "<p>" + escapeHtml(body).replace(/\n\n/g, "</p><p>").replace(/\n/g, "<br>") + "</p>";
            }
          })
          .catch(function(){
            document.getElementById("post-meta").textContent = "";
            document.getElementById("post-title").textContent = "Post not found";
            document.getElementById("post-body").innerHTML = "<p>This post could not be loaded. <a href=\"/writing\">Back to writing</a>.</p>";
          });
        function escapeHtml(s){
          var d = document.createElement("div");
          d.textContent = s;
          return d.innerHTML;
        }
      })();
    </script>
  </body>
</html>
